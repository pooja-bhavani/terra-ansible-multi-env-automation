---
# roles/webserver/tasks/main.yml

- name: Update apt cache and upgrade all packages
  apt:
    update_cache: yes
    upgrade: dist

- name: Install common packages
  apt:
    name: "{{ packages }}"
    state: present

- name: Ensure nginx is running and enabled
  service:
    name: nginx
    state: started
    enabled: true
  notify: Restart nginx

- name: Ensure web root directory exists
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Deploy project landing page
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: "0644"
  notify: Restart nginx
